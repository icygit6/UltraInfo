name: flutter_application_1
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/ultraman-logo.png"
  remove_alpha_ios: true
  windows:
    generate: true
  macos:
    generate: true
  linux:
    generate: true
  web:
    generate: false

flutter:
  uses-material-design: true
  assets:
    - assets/images/
